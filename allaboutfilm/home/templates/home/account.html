{% extends "home/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
    {% if user.is_authenticated %}
        <div class="container py-5 text-center">
            <i class="fas fa-user-circle mb-3" style="font-size: 4rem; color: var(--text-color);" aria-hidden="true"></i>
            <h1>Welcome, {{ user.username }}</h1>
            <p class="text-muted">Your account page is coming soon.</p>
        </div>
    {% else %}
        <div class="container py-5">
            <div class="auth-card mx-auto">
                <h2 class="text-center mb-4">Log In</h2>
                {% crispy form %}
                <div class="auth-links text-center mt-3">
                    <a href="{% url 'recover' %}">Forgot your password?</a>
                    <br>
                    <a href="{% url 'register' %}">Not registered yet?</a>
                </div>
            </div>
        </div>
    {% endif %}
{% endblock %}
