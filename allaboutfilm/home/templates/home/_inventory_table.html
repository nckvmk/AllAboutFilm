<div class="table-responsive">
    <table class="table inventory-table align-middle mb-0">
        <thead>
            <tr>
                {% for col in columns %}<th>{{ col }}</th>{% endfor %}
                <th class="text-nowrap text-end">
                    Action
                    <button type="button" class="btn btn-sm btn-success inventory-add ms-1"
                            data-category="{{ category }}" title="Add new" aria-label="Add new">
                        <i class="fas fa-plus"></i>
                    </button>
                </th>
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
                <tr data-code="{{ row.code }}">
                    {% for cell in row.cells %}<td>{{ cell }}</td>{% endfor %}
                    <td class="text-nowrap text-end">
                        <button type="button" class="btn btn-sm btn-outline-secondary inventory-edit"
                                data-code="{{ row.code }}" title="Edit" aria-label="Edit">
                            <i class="fas fa-pen"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger inventory-delete"
                                data-code="{{ row.code }}" data-name="{{ row.cells.1 }} {{ row.cells.2 }}"
                                title="Delete" aria-label="Delete">
                            <i class="fas fa-xmark"></i>
                        </button>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="{{ columns|length|add:1 }}" class="text-center text-muted py-4">
                        No items in this category.
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
