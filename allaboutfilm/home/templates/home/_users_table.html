<div class="table-responsive">
    <table class="table inventory-table align-middle mb-0">
        <thead>
            <tr>
                <th>Username</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Status</th>
                <th class="text-end">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
                <tr data-user-id="{{ u.id }}">
                    <td>{{ u.username }}</td>
                    <td>{{ u.first_name }}</td>
                    <td>{{ u.last_name }}</td>
                    <td>{{ u.email }}</td>
                    <td class="user-status">
                        {% if u.is_active %}
                            <span class="status-active">Active</span>
                        {% else %}
                            <span class="status-suspended">Suspended</span>
                        {% endif %}
                    </td>
                    <td class="text-end">
                        <button type="button"
                                class="btn btn-sm user-suspend-btn {% if u.is_active %}btn-outline-danger{% else %}btn-outline-success{% endif %}"
                                data-user-id="{{ u.id }}">
                            {% if u.is_active %}Suspend{% else %}Unsuspend{% endif %}
                        </button>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="6" class="text-center text-muted py-4">No {{ user_category_label|lower }} found.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
